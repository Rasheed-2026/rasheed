<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — رشيد</title>

    <!-- خط عربي من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="auth-container">
        <div class="auth-card">
            <h1 class="auth-card__title">رشيد</h1>
            <p class="auth-card__subtitle">مستشارك في التسعير</p>

            <div class="auth-tabs">
                <button class="auth-tab auth-tab--active" data-tab="login">تسجيل الدخول</button>
                <button class="auth-tab" data-tab="signup">إنشاء حساب</button>
            </div>

            <form id="login-form" class="auth-form">
                <label for="login-email">البريد الإلكتروني</label>
                <input type="email" id="login-email" required placeholder="example@email.com" dir="ltr">

                <label for="login-password">كلمة المرور</label>
                <input type="password" id="login-password" required placeholder="********" dir="ltr" minlength="6">

                <button type="submit" class="btn btn--primary btn--full">تسجيل الدخول</button>
            </form>

            <form id="signup-form" class="auth-form" hidden>
                <label for="signup-email">البريد الإلكتروني</label>
                <input type="email" id="signup-email" required placeholder="example@email.com" dir="ltr">

                <label for="signup-password">كلمة المرور</label>
                <input type="password" id="signup-password" required placeholder="6 أحرف على الأقل" dir="ltr" minlength="6">

                <label for="signup-password-confirm">تأكيد كلمة المرور</label>
                <input type="password" id="signup-password-confirm" required placeholder="أعد كتابة كلمة المرور" dir="ltr" minlength="6">

                <button type="submit" class="btn btn--primary btn--full">إنشاء حساب</button>
            </form>

            <div id="auth-message" class="auth-message"></div>
        </div>
    </main>

    <!-- مكتبة Supabase من CDN أولاً، ثم تهيئة العميل، ثم منطق الصفحة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
