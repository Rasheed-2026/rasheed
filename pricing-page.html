<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التسعير — رشيد</title>

    <!-- خط عربي من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ترويسة التطبيق: الاسم + شريط التنقل في صف واحد -->
    <header class="app-header">
        <h1 class="app-header__title">رشيد</h1>
        <nav class="nav" aria-label="القائمة الرئيسية">
            <div class="nav__main-links">
                <a href="ingredients.html" class="nav-link">المكونات</a>
                <a href="recipes.html" class="nav-link">الوصفات</a>
                <a href="pricing-page.html" class="nav-link nav-link--active">التسعير</a>
                <a href="shopping.html" class="nav-link">قائمة التسوق</a>
            </div>
            <div class="nav__help-link">
                <a href="help.html" class="nav-link">كيف تستخدم؟</a>
                <button id="logout-btn" class="btn btn--logout">تسجيل الخروج</button>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>التسعير</h1>
        <p class="intro">اختر وصفة وهامش ربح لحساب سعرها، وقارن بين وصفاتك.</p>

        <!-- نموذج اختيار الوصفة والهامش -->
        <section class="card form-section" aria-labelledby="pricing-form-title">
            <h2 id="pricing-form-title">احسب تكلفة وصفة</h2>

            <form id="pricing-form" novalidate>
                <div class="field">
                    <label for="recipe-select">الوصفة</label>
                    <select id="recipe-select" name="recipe-select" required>
                        <option value="" disabled selected>اختر وصفة</option>
                    </select>
                </div>

                <div class="field">
                    <label for="margin-select">هامش الربح</label>
                    <select id="margin-select" name="margin-select" required>
                        <option value="20">ربح 20%</option>
                        <option value="30" selected>ربح 30%</option>
                        <option value="50">ربح 50%</option>
                        <option value="custom">مخصص</option>
                    </select>
                </div>

                <div class="field" id="custom-margin-field" hidden>
                    <label for="custom-margin">النسبة المخصصة</label>
                    <input
                        type="number"
                        id="custom-margin"
                        name="custom-margin"
                        placeholder="النسبة %"
                        min="0"
                        step="1"
                    >
                    <p class="field-hint">أدخل النسبة المئوية للربح (مثال: 35)</p>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">احسب</button>
                </div>
            </form>
        </section>

        <!-- منطقة نتيجة الحساب -->
        <section id="calculation-result" class="cost-breakdown" hidden aria-live="polite"></section>

        <!-- منطقة المقارنة -->
        <section id="comparison-section" class="comparison-section" hidden aria-labelledby="comparison-title"></section>

        <!-- قالب مخفي يستخدمه html2canvas لتوليد الصورة.
             موضوع خارج الشاشة عبر CSS (ليس display:none عشان
             المكتبة تقدر ترسمه). JS يملأ محتواه عند التصدير. -->
        <div id="customer-image-template" class="customer-image-template" aria-hidden="true">
            <div class="customer-image-template__inner">
                <h2 class="customer-image-template__recipe-name"></h2>
                <div class="customer-image-template__price-main">
                    <div class="customer-image-template__price-label">السعر</div>
                    <div class="customer-image-template__price-value"></div>
                </div>
                <div class="customer-image-template__per-serving">
                    <div class="customer-image-template__per-serving-label">سعر الحصة الواحدة</div>
                    <div class="customer-image-template__per-serving-value"></div>
                    <div class="customer-image-template__servings-note"></div>
                </div>
                <div class="customer-image-template__message"></div>
            </div>
        </div>
    </main>

    <!-- Supabase أولاً: المكتبة، ثم تهيئة العميل، ثم حارس الصفحة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth-guard.js"></script>

    <!-- مكتبة html2canvas من CDN — لتحويل العنصر إلى صورة PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- ترتيب التحميل مهم — كل ملف يعتمد على اللي قبله:
         ingredients → settings → recipes → pricing → ملف الواجهة -->
    <script src="js/ingredients.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/pricing.js"></script>
    <script src="js/pricing-page-main.js"></script>
</body>
</html>
