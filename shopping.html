<!DOCTYPE html>
<html lang="ar-u-nu-latn" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة التسوق — رشيد</title>

    <!-- خط عربي من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ترويسة التطبيق: الاسم + شريط التنقل في صف واحد -->
    <header class="app-header">
        <a href="index.html" class="app-header__title-link">
            <h1 class="app-header__title">رشيد</h1>
        </a>
        <button class="hamburger-btn" id="hamburger-btn" aria-label="القائمة">☰</button>
        <div class="nav-menu" id="nav-menu">
            <nav class="nav" aria-label="القائمة الرئيسية">
                <div class="nav__main-links">
                    <a href="ingredients.html" class="nav-link">المكونات</a>
                    <a href="recipes.html" class="nav-link">الوصفات</a>
                    <a href="pricing-page.html" class="nav-link">التسعير</a>
                    <a href="shopping.html" class="nav-link nav-link--active">قائمة التسوق</a>
                    <a href="orders.html" class="nav-link">الطلبات</a>
                </div>
            </nav>
            <button id="logout-btn" class="btn btn--logout">تسجيل الخروج</button>
        </div>
    </header>

    <main class="container">
        <h1>قائمة التسوق</h1>
        <p class="intro">اختر الوصفات اللي تبغى تسوي لها، وسنحسب لك قائمة مكونات موحدة مع التكلفة.</p>

        <!-- رسالة تظهر لما ما يكون فيه وصفات محفوظة -->
        <p id="no-recipes-message" class="empty-state" hidden>
            لا توجد وصفات محفوظة. أضف وصفة أولاً من شاشة الوصفات.
        </p>

        <!-- القسم 1: إضافة وصفة للقائمة -->
        <section id="add-recipe-section" class="card form-section" aria-labelledby="add-recipe-title">
            <h2 id="add-recipe-title">إضافة وصفة للقائمة</h2>

            <div class="field">
                <label for="recipe-select">الوصفة</label>
                <select id="recipe-select">
                    <option value="">اختر وصفة</option>
                </select>
            </div>

            <div class="field">
                <label for="recipe-quantity">الكمية</label>
                <input
                    type="text"
                    inputmode="decimal"
                    pattern="[0-9.,٠-٩،.]*"
                    id="recipe-quantity"
                    value="1"
                    placeholder="1"
                >
            </div>

            <button type="button" id="add-recipe-btn" class="btn btn-primary">أضف</button>
        </section>

        <!-- القسم 2: الوصفات المختارة -->
        <section id="selected-recipes-section" class="card" aria-labelledby="selected-recipes-title" hidden>
            <h2 id="selected-recipes-title">الوصفات المختارة</h2>
            <div id="selected-recipes-list"></div>
            <button type="button" id="clear-selections-btn" class="btn btn-secondary">مسح كل الوصفات</button>
        </section>

        <!-- القسم 3: قائمة التسوق المحسوبة -->
        <section id="shopping-result-section" class="card" aria-labelledby="shopping-result-title" hidden>
            <h2 id="shopping-result-title">قائمة التسوق</h2>
            <div id="shopping-warnings"></div>
            <div id="shopping-items-list"></div>
            <div id="shopping-total" class="shopping-total"></div>
            <div class="shopping-actions">
                <button type="button" id="copy-list-btn" class="btn btn-secondary">نسخ القائمة</button>
                <button type="button" id="save-list-btn" class="btn btn-secondary">احفظ القائمة</button>
                <span id="shopping-feedback" class="shopping-feedback"></span>
            </div>
        </section>

        <!-- القسم 4: القوائم المحفوظة -->
        <section id="saved-lists-section" class="card" aria-labelledby="saved-lists-title" hidden>
            <h2 id="saved-lists-title">القوائم المحفوظة</h2>
            <div id="saved-lists-container"></div>
        </section>
    </main>

    <footer class="app-footer">
        <a href="help.html" class="app-footer__link">كيف تستخدم؟</a>
        <span class="app-footer__separator">|</span>
        <span class="app-footer__copyright">© رشيد ٢٠٢٦</span>
    </footer>

    <!-- Supabase أولاً: المكتبة، ثم تهيئة العميل، ثم حارس الصفحة -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/ingredients.js"></script>
    <script src="js/recipes.js"></script>
    <script src="js/shopping-lists.js"></script>
    <script src="js/shopping-aggregator.js"></script>
    <script src="js/shopping-main.js"></script>
</body>
</html>
