<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة التسعير للأسر المنتجة</title>

    <!-- خط عربي من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- ترويسة التطبيق: الاسم + شريط التنقل في صف واحد -->
    <header class="app-header">
        <h1 class="app-header__title">حاسبة التسعير للأسر المنتجة</h1>
        <nav class="nav" aria-label="القائمة الرئيسية">
            <div class="nav__main-links">
                <a href="index.html" class="nav-link nav-link--active">المكونات</a>
                <a href="recipes.html" class="nav-link">الوصفات</a>
                <a href="pricing-page.html" class="nav-link">التسعير</a>
                <a href="shopping.html" class="nav-link">قائمة التسوق</a>
            </div>
            <div class="nav__help-link">
                <a href="help.html" class="nav-link">كيف تستخدم؟</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <h1>المكونات</h1>
        <p class="intro">أضف المكونات التي تستخدمها في منتجاتك. سنستخدمها لاحقاً في حساب تكلفة الوصفات.</p>

        <!-- نموذج إضافة مكون جديد -->
        <section class="card form-section" aria-labelledby="add-form-title">
            <h2 id="add-form-title">إضافة مكون جديد</h2>

            <form id="add-ingredient-form" novalidate>
                <div class="field">
                    <label for="ingredient-name">اسم المكون</label>
                    <input
                        type="text"
                        id="ingredient-name"
                        name="ingredient-name"
                        placeholder="مثال: طحين"
                        required
                    >
                </div>

                <div class="field">
                    <label for="package-amount">حجم العبوة</label>
                    <input
                        type="number"
                        id="package-amount"
                        name="package-amount"
                        placeholder="مثال: 5"
                        min="0"
                        step="any"
                        required
                    >
                </div>

                <div class="field">
                    <label for="package-unit">الوحدة</label>
                    <select id="package-unit" name="package-unit" required>
                        <option value="g">جرام</option>
                        <option value="kg">كيلوجرام</option>
                        <option value="ml">مليلتر</option>
                        <option value="l">لتر</option>
                        <option value="piece">حبة / قطعة</option>
                    </select>
                </div>

                <div class="field">
                    <label for="package-price">سعر العبوة (ريال)</label>
                    <input
                        type="number"
                        id="package-price"
                        name="package-price"
                        placeholder="مثال: 25"
                        min="0"
                        step="any"
                        required
                    >
                </div>

                <div class="form-actions">
                    <button type="submit" id="submit-btn" class="btn btn-primary">أضف المكون</button>
                    <button type="button" id="cancel-edit-btn" class="btn btn-secondary" hidden>إلغاء</button>
                </div>
            </form>
        </section>

        <!-- قائمة المكونات المضافة -->
        <section class="list-section" aria-labelledby="list-title">
            <h2 id="list-title">المكونات المضافة</h2>
            <div id="ingredients-list" class="ingredients-grid">
                <p class="empty-state">لم تضف أي مكونات بعد.</p>
            </div>
        </section>

        <!-- سهم الانتقال للصفحة التالية -->
        <div class="next-page-arrow">
            <a href="recipes.html" class="next-page-arrow__link">
                التالي: الوصفات
                <span class="next-page-arrow__icon" aria-hidden="true">←</span>
            </a>
        </div>
    </main>

    <!-- ترتيب مهم: ingredients.js يجي أول عشان main.js يقدر يستخدم دواله -->
    <script src="js/ingredients.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
